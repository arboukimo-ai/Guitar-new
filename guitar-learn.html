<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎸 吉他基礎教學</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a14;--bg2:#111120;--bg3:#1a1a2e;--bg4:#22223a;
  --gold:#f0a500;--red:#e05a5a;--green:#4ec9a0;--blue:#5a9ee0;
  --text:#e8e8f0;--muted:#777;--border:#2a2a44;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e,#0a0a14);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:58px;z-index:99}
.tab{flex:1;padding:11px 0;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;border-bottom:2px solid transparent}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);font-weight:700}
#page{padding:16px;max-width:640px;margin:0 auto;padding-bottom:40px}
.card{background:var(--bg2);border-radius:14px;padding:16px;border:1px solid var(--border);margin-bottom:14px}
.btn{border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:700;font-size:14px;padding:11px 16px;width:100%;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-gold{background:var(--gold);color:#0a0a14}
.btn-red{background:var(--red);color:#fff}
.btn-green{background:var(--green);color:#0a0a14}
.btn-sm{width:auto;padding:7px 12px;font-size:12px;background:var(--bg4);color:var(--text);border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-weight:600}
.btn-sm.on{background:var(--gold);color:#0a0a14}
h2{font-size:19px;font-weight:900;color:var(--gold);margin-bottom:12px}
h3{font-size:14px;font-weight:700;color:var(--blue);margin:14px 0 8px}
p{font-size:13px;color:#bbb;line-height:1.7;margin-bottom:10px}
.notice{background:#1a2000;border:1px solid #3a4a00;border-radius:10px;padding:10px 14px;font-size:12px;color:#c8d880;margin-bottom:12px}
.errbox{background:#3a1a1a;border:1px solid var(--red);border-radius:10px;padding:12px;font-size:12px;color:#ffaaaa;margin-bottom:10px;display:none}
/* chord grid */
.chord-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.chord-card{background:var(--bg3);border-radius:12px;padding:8px 4px;cursor:pointer;border:2px solid transparent;text-align:center;transition:border-color .2s}
.chord-card:hover,.chord-card.on{border-color:var(--gold)}
/* pitch */
.pitch-row{display:flex;align-items:center;gap:12px;background:var(--bg4);border-radius:12px;padding:14px;margin:10px 0}
.pdot{width:16px;height:16px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .1s,box-shadow .1s}
.pdot.ok{background:var(--green);box-shadow:0 0 10px var(--green)}
.pdot.ng{background:var(--red);box-shadow:0 0 8px var(--red)}
.pdot.pulse{background:var(--gold);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* tuner */
.meter{position:relative;height:20px;background:var(--bg4);border-radius:10px;margin:10px 0}
.meter-mid{position:absolute;left:50%;top:0;width:2px;height:100%;background:var(--gold)}
.needle{position:absolute;top:50%;transform:translateY(-50%);width:14px;height:14px;border-radius:50%;margin-left:-7px;background:var(--green);transition:left .08s}
.needle.hi{background:var(--red)}
.needle.lo{background:var(--blue)}
.str-btns{display:flex;gap:4px;margin-bottom:10px}
.str-btn{flex:1;padding:6px 2px;font-size:10px;text-align:center;background:var(--bg4);border:1px solid var(--border);border-radius:8px;cursor:pointer;color:#aaa;font-family:inherit}
.str-btn.hit{background:var(--gold);color:#0a0a14;font-weight:700}
/* beats */
.beats{display:flex;gap:10px;justify-content:center;margin:12px 0}
.beat{width:28px;height:28px;border-radius:50%;background:var(--bg4);transition:background .05s,transform .05s}
.beat.b1{background:var(--gold);transform:scale(1.3)}
.beat.b2{background:var(--blue);transform:scale(1.15)}
/* bpm */
.bpm-ctrl{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.bpm-num{font-size:32px;font-weight:900;color:var(--gold);min-width:56px;text-align:center}
input[type=range]{flex:1;accent-color:var(--gold);cursor:pointer}
/* volume slider */
.vol-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;color:var(--muted)}
/* calendar */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav{background:var(--bg4);border:none;color:var(--gold);font-size:22px;cursor:pointer;border-radius:8px;padding:2px 12px;font-family:inherit}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center}
.cwd{font-size:10px;color:var(--muted);padding-bottom:4px}
.cday{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:12px}
.cday.p{background:var(--gold);color:#0a0a14;font-weight:700}
.cday.t{border:1.5px solid var(--gold);color:var(--gold)}
/* chapter */
.chbtn{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 16px;cursor:pointer;color:var(--text);font-family:inherit;font-size:14px;width:100%;margin-bottom:8px;text-align:left}
.chbtn:hover,.chbtn.on{border-color:var(--gold);background:var(--bg4)}
/* quiz */
.qopt{width:100%;padding:11px 14px;margin-bottom:8px;background:var(--bg4);border:1px solid var(--border);border-radius:10px;color:var(--text);cursor:pointer;font-family:inherit;font-size:14px;text-align:left}
.qopt.ok{background:#1a3a2a;border-color:var(--green);color:var(--green)}
.qopt.ng{background:#3a1a1a;border-color:var(--red);color:var(--red)}
/* song */
.song-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.song-bar{background:var(--bg3);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
/* reward */
.reward-bar{background:var(--bg4);border-radius:10px;padding:10px 14px;margin-bottom:10px}
.reward-progress{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:6px}
.reward-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--green));transition:width .3s}
/* fireworks overlay */
#fwOverlay{position:fixed;inset:0;background:rgba(10,10,20,0.92);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.fw-canvas{position:absolute;inset:0}
.fw-text{position:relative;z-index:2}
/* fade */
.fade{animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
/* overlay */
#micOv{position:fixed;inset:0;background:rgba(10,10,20,0.95);z-index:9998;display:flex;align-items:center;justify-content:center;padding:24px}
</style>
</head>
<body>

<div class="header">
  <span style="font-size:28px">🎸</span>
  <div>
    <div style="font-weight:900;font-size:18px;color:var(--gold)">吉他基礎教學</div>
    <div style="font-size:11px;color:var(--muted)">零基礎到第一首歌</div>
  </div>
  <div style="margin-left:auto;background:var(--bg3);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--gold)" id="streak">🔥 0天</div>
</div>
<div class="tabs">
  <button class="tab on" onclick="go('課程')">📚 課程</button>
  <button class="tab" onclick="go('和弦')">✋ 和弦</button>
  <button class="tab" onclick="go('工具')">🛠 工具</button>
  <button class="tab" onclick="go('進度')">📅 進度</button>
</div>
<div id="page"></div>

<!-- Fireworks overlay -->
<div id="fwOverlay">
  <canvas class="fw-canvas" id="fwCanvas"></canvas>
  <div class="fw-text">
    <div style="font-size:64px;margin-bottom:10px">🎉</div>
    <div style="font-size:28px;font-weight:900;color:var(--gold);margin-bottom:8px">太棒了！</div>
    <div style="font-size:16px;color:#bbb;margin-bottom:24px">連續彈對 10 個循環！</div>
    <button onclick="closeReward()" style="padding:14px 32px;border:none;border-radius:12px;background:var(--gold);color:#0a0a14;font-weight:900;font-size:16px;cursor:pointer;font-family:inherit">繼續練習 💪</button>
  </div>
</div>

// ═══════════════════════════
// GUITAR SHAPE CHORD SVG
// ═══════════════════════════
function svgChord(ch, W){
  W = W||160;
  // Guitar neck dimensions
  var neckTop = 60, neckH = W*0.85, neckW = W*0.55;
  var nL = (W-neckW)/2;
  var frets = 5, strings = 6;
  var fw = neckH/frets, sw = neckW/5;
  var H = neckTop + neckH + 60;

  var s = "<svg width=\""+W+"\" height=\""+H+"\" viewBox=\"0 0 "+W+" "+H+"\">";

  // ── Guitar body (simplified) ──
  var bx=W/2, by=neckTop+neckH+35, br1=28, br2=22;
  s += "<ellipse cx=\""+bx+"\" cy=\""+by+"\" rx=\""+br1+"\" ry=\""+br2+"\" fill=\"#8B5E3C\" stroke=\"#5a3010\" stroke-width=\"2\"/>";
  s += "<ellipse cx=\""+bx+"\" cy=\""+by+"\" rx=\""+(br1*0.45)+"\" ry=\""+(br2*0.45)+"\" fill=\"#3a1a05\" stroke=\"#5a3010\" stroke-width=\"1\"/>";

  // ── Neck background ──
  s += "<rect x=\""+nL+"\" y=\""+neckTop+"\" width=\""+neckW+"\" height=\""+neckH+"\" rx=\"3\" fill=\"#5a3a1a\"/>";

  // ── Fretboard ──
  s += "<rect x=\""+nL+"\" y=\""+neckTop+"\" width=\""+neckW+"\" height=\""+neckH+"\" rx=\"3\" fill=\"url(#wood)\"/>";

  // Wood grain gradient
  s += "<defs><linearGradient id=\"wood\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">";
  s += "<stop offset=\"0%\" stop-color=\"#6B3F1A\"/>";
  s += "<stop offset=\"30%\" stop-color=\"#8B5E3C\"/>";
  s += "<stop offset=\"60%\" stop-color=\"#7a4f2a\"/>";
  s += "<stop offset=\"100%\" stop-color=\"#6B3F1A\"/>";
  s += "</linearGradient></defs>";

  // ── Nut (top of fretboard) ──
  s += "<rect x=\""+nL+"\" y=\""+neckTop+"\" width=\""+neckW+"\" height=\"6\" fill=\"#e8d9b0\" rx=\"2\"/>";

  // ── Fret numbers on left ──
  for(var f=1;f<=4;f++){
    var fy = neckTop + 6 + (f-0.5)*fw;
    s += "<text x=\""+(nL-8)+"\" y=\""+(fy+4)+"\" text-anchor=\"middle\" font-size=\"9\" fill=\"#888\" font-family=\"sans-serif\">"+f+"</text>";
  }

  // ── Fret wires ──
  for(var f=1;f<=frets;f++){
    var fy = neckTop + 6 + f*fw;
    s += "<line x1=\""+nL+"\" y1=\""+fy+"\" x2=\""+( nL+neckW)+"\" y2=\""+fy+"\" stroke=\"#c8b89a\" stroke-width=\"2\"/>";
    s += "<line x1=\""+nL+"\" y1=\""+fy+"\" x2=\""+( nL+neckW)+"\" y2=\""+fy+"\" stroke=\"#fff\" stroke-width=\"0.5\" opacity=\"0.3\"/>";
  }

  // ── Strings (6, varying thickness) ──
  var strThick = [2.2, 1.8, 1.5, 1.2, 0.9, 0.7];
  var strColor = ["#bbb","#bbb","#ccc","#ddd","#eee","#fff"];
  for(var i=0;i<6;i++){
    var sx = nL + i*sw;
    s += "<line x1=\""+sx+"\" y1=\""+neckTop+"\" x2=\""+sx+"\" y2=\""+(neckTop+neckH)+"\" stroke=\""+strColor[i]+"\" stroke-width=\""+strThick[i]+"\" opacity=\"0.85\"/>";
  }

  // ── Headstock ──
  s += "<rect x=\""+(W/2-18)+"\" y=\"4\" width=\"36\" height=\""+( neckTop-4)+"\" rx=\"6\" fill=\"#8B5E3C\" stroke=\"#5a3010\" stroke-width=\"1.5\"/>";
  // Tuning pegs
  var pegX = [[W/2-18,10],[W/2-18,24],[W/2-18,38],[W/2+18,10],[W/2+18,24],[W/2+18,38]];
  for(var i=0;i<6;i++){
    s += "<circle cx=\""+pegX[i][0]+"\" cy=\""+pegX[i][1]+"\" r=\"5\" fill=\"#c8a050\" stroke=\"#888\" stroke-width=\"1\"/>";
    s += "<circle cx=\""+pegX[i][0]+"\" cy=\""+pegX[i][1]+"\" r=\"2\" fill=\"#888\"/>";
  }

  // ── Muted (✕) and Open (○) markers at nut ──
  for(var i=0;i<(ch.muted||[]).length;i++){
    var str=ch.muted[i];
    var mx=nL+(6-str)*sw;
    s += "<text x=\""+mx+"\" y=\""+(neckTop-4)+"\" text-anchor=\"middle\" font-size=\"13\" fill=\"#e05a5a\" font-family=\"sans-serif\">✕</text>";
  }
  for(var i=0;i<(ch.open||[]).length;i++){
    var str=ch.open[i];
    var ox=nL+(6-str)*sw;
    s += "<circle cx=\""+ox+"\" cy=\""+(neckTop-8)+"\" r=\"5\" fill=\"none\" stroke=\"#4ec9a0\" stroke-width=\"1.5\"/>";
  }

  // ── Barre ──
  if(ch.barre){
    var by2 = neckTop + 6 + (ch.barre.fret-0.5)*fw;
    s += "<rect x=\""+(nL+2)+"\" y=\""+(by2-fw*0.28)+"\" width=\""+(neckW-4)+"\" height=\""+(fw*0.56)+"\" rx=\""+(fw*0.28)+"\" fill=\"#f0a500\" opacity=\"0.9\"/>";
    s += "<text x=\""+W/2+"\" y=\""+(by2+4)+"\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0a0a14\" font-weight=\"bold\" font-family=\"sans-serif\">1</text>";
  }

  // ── Finger dots (3D sphere effect) ──
  for(var i=0;i<ch.fingers.length;i++){
    var fi=ch.fingers[i];
    var fx=nL+(6-fi.s)*sw;
    var fy2=neckTop+6+(fi.f-0.5)*fw;
    var r=fw*0.32;
    // Shadow
    s += "<circle cx=\""+(fx+2)+"\" cy=\""+(fy2+2)+"\" r=\""+r+"\" fill=\"rgba(0,0,0,0.4)\"/>";
    // Main dot
    s += "<circle cx=\""+fx+"\" cy=\""+fy2+"\" r=\""+r+"\" fill=\"#f0a500\"/>";
    // Highlight
    s += "<circle cx=\""+(fx-r*0.3)+"\" cy=\""+(fy2-r*0.3)+"\" r=\""+(r*0.35)+"\" fill=\"rgba(255,255,255,0.4)\"/>";
    // Finger number
    s += "<text x=\""+fx+"\" y=\""+(fy2+3.5)+"\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0a0a14\" font-weight=\"bold\" font-family=\"sans-serif\">"+fi.n+"</text>";
  }

  // String labels at bottom
  for(var i=0;i<6;i++){
    var lx=nL+i*sw;
    s += "<text x=\""+lx+"\" y=\""+(neckTop+neckH+14)+"\" text-anchor=\"middle\" font-size=\"8\" fill=\"#666\" font-family=\"sans-serif\">"+(6-i)+"弦</text>";
  }

  s += "</svg>";
  return s;
}

var MTID=null, MBEAT=0, MBPM=80, MSIG=4, MON=false, MMUTED=false, MVOL=1.0;
var MAC=null;

function mClick(isDown){
  if(MMUTED) return;
  var snd=(isDown?SND_HI:SND_LO).cloneNode();
  snd.volume=Math.min(1,MVOL); snd.play().catch(function(){});
}
function mSched(){
  var b=MBEAT%MSIG; mClick(b===0);
  document.querySelectorAll(".mbeat").forEach(function(el,i){ el.className="beat mbeat"+(i===b?(b===0?" b1":" b2"):""); });
  setTimeout(function(){ document.querySelectorAll(".mbeat").forEach(function(el){ el.className="beat mbeat"; }); },80);
  MBEAT++;
}
function mStart(){
  var silent=(SND_HI).cloneNode(); silent.volume=0.001; silent.play().catch(function(){});
  var interval=Math.round(60000/MBPM);
  MBEAT=0; MON=true; mSched(); MTID=setInterval(mSched,interval); updMBtn();
}
function mStop(){ clearInterval(MTID); MON=false; document.querySelectorAll(".mbeat").forEach(function(el){el.className="beat mbeat";}); updMBtn(); }

var fwRaf=null, particles=[];
function startFireworks(){
  var canvas=document.getElementById("fwCanvas");
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  particles=[];
  for(var i=0;i<8;i++) spawnBurst(canvas);
  fwRaf=requestAnimationFrame(function loop(){
    var ctx=canvas.getContext("2d");
    ctx.fillStyle="rgba(10,10,20,0.15)"; ctx.fillRect(0,0,canvas.width,canvas.height);
    particles=particles.filter(function(p){
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.018; p.r*=0.97;
      if(p.life<=0) return false;
      ctx.globalAlpha=p.life; ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=p.c; ctx.fill();
      return true;
    });
    ctx.globalAlpha=1;
    if(particles.length<50) spawnBurst(canvas);
    fwRaf=requestAnimationFrame(loop);
  });
}
function spawnBurst(canvas){
  var x=Math.random()*canvas.width, y=Math.random()*canvas.height*0.6;
  var cols=["#f0a500","#4ec9a0","#e05a5a","#5a9ee0","#fff","#ff69b4"];
  for(var i=0;i<40;i++){
    var a=Math.random()*Math.PI*2, v=Math.random()*6+2;
    particles.push({x:x,y:y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-3,r:Math.random()*4+2,life:1,c:cols[Math.floor(Math.random()*cols.length)]});
  }
}
function stopFireworks(){ cancelAnimationFrame(fwRaf); particles=[]; }

// ═══════════════════════════
// TUNER
// ═══════════════════════════
var TUNER_AC=null,TUNER_AN=null,TUNER_STREAM=null,TUNER_RAF=null,TUNER_ON=false;
var TUNING=[{s:6,n:"E2",f:82.41},{s:5,n:"A2",f:110},{s:4,n:"D3",f:146.83},{s:3,n:"G3",f:196},{s:2,n:"B3",f:246.94},{s:1,n:"E4",f:329.63}];
function acf(buf,rate){
  var n=buf.length,rms=0; for(var i=0;i<n;i++) rms+=buf[i]*buf[i]; rms=Math.sqrt(rms/n);
  if(rms<0.01) return -1;
  var c=new Float32Array(n); for(var i=0;i<n;i++) for(var j=0;j<n-i;j++) c[i]+=buf[j]*buf[j+i];
  var go=false,mx=-1,mp=-1;
  for(var i=1;i<n/2;i++){ if(c[i]>c[i-1]) go=true; else if(go){if(c[i-1]>mx){mx=c[i-1];mp=i-1;}go=false;} }
  if(mp<2) return -1; var f=rate/mp; return(f>55&&f<1400)?f:-1;
}
function fToMidi(f){return Math.round(12*Math.log2(f/440)+69);}
function fToNote(f){return NOTES[((fToMidi(f)%12)+12)%12];}
function fToCents(f){var e=12*Math.log2(f/440),m=Math.round(e)+69;return Math.round((e-(m-69))*100);}
function tStart(){
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}})
  .then(function(stream){
    TUNER_STREAM=stream;
    TUNER_AC=new (window.AudioContext||window.webkitAudioContext)();
    TUNER_AC.resume().then(function(){
      var src=TUNER_AC.createMediaStreamSource(stream);
      TUNER_AN=TUNER_AC.createAnalyser(); TUNER_AN.fftSize=4096; src.connect(TUNER_AN);
      TUNER_ON=true; updTBtn();
      var buf=new Float32Array(TUNER_AN.fftSize);
      function loop(){
        if(!TUNER_ON) return;
        TUNER_AN.getFloatTimeDomainData(buf);
        var f=acf(buf,TUNER_AC.sampleRate);
        if(f>0){ var note=fToNote(f),cents=fToCents(f),closest=TUNING.reduce(function(a,b){return Math.abs(f-a.f)<Math.abs(f-b.f)?a:b;}); updTuner(note,cents,closest); }
        TUNER_RAF=requestAnimationFrame(loop);
      }
      loop();
    });
  }).catch(function(e){ var el=document.getElementById("tErr"); if(el){el.style.display="block";el.textContent="❌ 麥克風錯誤："+e.message;} });
}
function tStop(){ TUNER_ON=false; cancelAnimationFrame(TUNER_RAF); if(TUNER_STREAM) TUNER_STREAM.getTracks().forEach(function(t){t.stop();}); if(TUNER_AC){TUNER_AC.close();TUNER_AC=null;} updTBtn(); updTuner(null,0,null); }
function updTBtn(){ var b=document.getElementById("tBtn"); if(!b) return; b.className=TUNER_ON?"btn btn-red":"btn btn-gold"; b.textContent=TUNER_ON?"⏹ 停止調音":"🎵 開始調音"; }
function updTuner(note,cents,closest){
  var n=document.getElementById("tNote"),m=document.getElementById("tMsg"),nd=document.getElementById("tNeedle"),cv=document.getElementById("tCents");
  if(!n) return;
  n.textContent=note||"—"; cv.textContent=note?(cents>0?"+"+cents+"¢":cents+"¢"):"";
  if(!note){m.textContent="彈奏任意弦…";m.style.color="var(--muted)";nd.style.left="50%";nd.className="needle";}
  else if(Math.abs(cents)<8){m.textContent="✅ 音準正確！";m.style.color="var(--green)";nd.className="needle";nd.style.left="50%";}
  else if(cents>0){m.textContent="⬇️ 偏高";m.style.color="var(--red)";nd.className="needle hi";nd.style.left=Math.min(90,50+cents)+"%";}
  else{m.textContent="⬆️ 偏低";m.style.color="var(--blue)";nd.className="needle lo";nd.style.left=Math.max(10,50+cents)+"%";}
  document.querySelectorAll(".str-btn").forEach(function(b){b.classList.toggle("hit",closest&&parseInt(b.dataset.s)===closest.s);});
}

// PITCH LISTENER
// ═══════════════════════════
var P_AC=null,P_AN=null,P_STREAM=null,P_RAF=null,P_ON=false,lastNote=null;
function pStart(){
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}})
  .then(function(stream){
    P_STREAM=stream;
    P_AC=new (window.AudioContext||window.webkitAudioContext)();
    P_AC.resume().then(function(){
      var src=P_AC.createMediaStreamSource(stream);
      P_AN=P_AC.createAnalyser(); P_AN.fftSize=4096; src.connect(P_AN);
      P_ON=true; lastNote=null; updPBtn();
      var buf=new Float32Array(P_AN.fftSize);
      var target=CHORDS[SEL_CHORD].root;
      function loop(){
        if(!P_ON) return;
        P_AN.getFloatTimeDomainData(buf);
        var f=acf(buf,P_AC.sampleRate);
        if(f>0){ var nn=fToNote(f); lastNote=nn; updPitch(nn,nn===target); }
        P_RAF=requestAnimationFrame(loop);
      }
      loop();
    });
  }).catch(function(e){ var el=document.getElementById("pErr"); if(el){el.style.display="block";el.textContent="❌ 麥克風錯誤："+e.message;} });
}
function pStop(){ P_ON=false; lastNote=null; cancelAnimationFrame(P_RAF); if(P_STREAM) P_STREAM.getTracks().forEach(function(t){t.stop();}); if(P_AC){P_AC.close();P_AC=null;} updPBtn(); updPitch(null,null); }
function updPBtn(){ var b=document.getElementById("pBtn"); if(!b) return; b.className=(P_ON&&PMON)?"btn btn-red":"btn btn-green"; b.textContent=(P_ON&&PMON)?"⏹ 停止":"🎵 開始練習（節拍＋聆聽）"; }
function updPitch(note,ok){
  var dot=document.getElementById("pdot"),nn=document.getElementById("pNote"),res=document.getElementById("pRes"),box=document.getElementById("pitchBox");
  if(!dot) return;
  if(!P_ON){ dot.className="pdot"; nn.textContent="—"; res.textContent="按「開始練習」後跟著節拍彈"; res.style.color="var(--muted)"; if(box){box.style.background="var(--bg4)";box.style.border="2px solid var(--border)";} return; }
  if(!note){ dot.className="pdot pulse"; nn.textContent="⋯"; res.textContent="聆聽中，請彈奏…"; res.style.color="var(--muted)"; if(box){box.style.background="var(--bg4)";box.style.border="2px solid var(--border)";} return; }
  if(ok){ dot.className="pdot ok"; nn.textContent=note; res.textContent="✅ 彈對了！"; res.style.color="var(--green)"; res.style.fontSize="22px"; if(box){box.style.background="#0a2a1a";box.style.border="2px solid var(--green)";} }
  else{ dot.className="pdot ng"; nn.textContent=note; res.textContent="❌ 偵測到 "+note+"，目標根音是 "+CHORDS[SEL_CHORD].root; res.style.color="var(--red)"; res.style.fontSize="18px"; if(box){box.style.background="#2a0a0a";box.style.border="2px solid var(--red)";} }
}

// ── PROGRESS ───────────────────────────────────
function pageProgress(){
  var y=CAL_Y,m=CAL_M,first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),today=new Date();
  var prefix=y+"-"+(m<9?"0":"")+(m+1)+"-",monthCount=0;
  for(var k in DB.log){ if(k.indexOf(prefix)===0) monthCount++; }
  var h="<h2>📅 練習紀錄</h2><div class=\"card\">";
  h+="<div class=\"cal-head\"><button class=\"cal-nav\" onclick=\"calNav(-1)\">‹</button><span style=\"font-weight:700;color:var(--gold)\">"+y+"年"+(m+1)+"月</span><button class=\"cal-nav\" onclick=\"calNav(1)\">›</button></div>";
  h+="<div class=\"cal-grid\">";
  ["日","一","二","三","四","五","六"].forEach(function(d){h+="<div class=\"cwd\">"+d+"</div>";});
  for(var i=0;i<first;i++) h+="<div></div>";
  for(var d=1;d<=days;d++){
    var dd=d<10?"0"+d:""+d,key=prefix+dd,p=DB.log[key],isT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    h+="<div class=\"cday"+(p?" p":isT?" t":"")+"\">" +d+"</div>";
  }
  h+="</div><div style=\"display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--muted)\"><span><span style=\"display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--gold);margin-right:4px\"></span>有練習</span><span>本月 "+monthCount+" 天</span><span>連續 "+streak()+" 天 🔥</span></div></div>";
  var CNAMES=[["🎸","吉他構造"],["🎵","基本樂理"],["✋","基礎和弦"],["🎶","撥弦技巧"],["🎤","第一首歌"]];
  h+="<div class=\"card\"><div style=\"font-weight:700;color:var(--gold);font-size:15px;margin-bottom:10px\">章節進度</div>";
  for(var i=0;i<5;i++){
    var done=DB.passed.indexOf(i+1)>=0;
    h+="<div style=\"display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)\"><span style=\"font-size:18px\">"+CNAMES[i][0]+"</span><span style=\"flex:1;color:"+(done?"var(--green)":"var(--text)")+"\">"+CNAMES[i][1]+"</span><span style=\"font-size:12px;color:"+(done?"var(--green)":"var(--muted)")+"\">  "+(done?"✅ 完成":"學習中")+"</span></div>";
  }
  h+="</div>"; return h;
}
function calNav(d){CAL_M+=d;if(CAL_M<0){CAL_M=11;CAL_Y--;}if(CAL_M>11){CAL_M=0;CAL_Y++;}render();}

// MIC / AUDIO UNLOCK

var AUDIO_UNLOCKED=false;
function unlockAudio(){
  var h=SND_HI.cloneNode(); h.volume=0.001; h.play().catch(function(){});
  var l=SND_LO.cloneNode(); l.volume=0.001; l.play().catch(function(){});
  AUDIO_UNLOCKED=true;
  var ov=document.getElementById("micOv"); if(ov) ov.remove();
}
function showMicOverlay(){
  var ov=document.createElement("div"); ov.id="micOv"; ov.className=""; 
  ov.style.cssText="position:fixed;inset:0;background:rgba(10,10,20,0.95);z-index:9998;display:flex;align-items:center;justify-content:center;padding:24px";
  ov.innerHTML="<div style=\"background:#1a1a2e;border:2px solid #f0a500;border-radius:18px;padding:32px 24px;max-width:340px;width:100%;text-align:center\">"
    +"<div style=\"font-size:52px;margin-bottom:12px\">🎸</div>"
    +"<div style=\"font-size:20px;font-weight:900;color:#f0a500;margin-bottom:10px\">吉他基礎教學</div>"
    +"<div style=\"font-size:13px;color:#bbb;line-height:1.7;margin-bottom:24px\">點下方按鈕開始，同時啟用<br>節拍器聲音與麥克風功能</div>"
    +"<button onclick=\"startApp()\" style=\"width:100%;padding:16px;border:none;border-radius:12px;background:#f0a500;color:#0a0a14;font-weight:900;font-size:18px;cursor:pointer;font-family:inherit;margin-bottom:10px\">🎵 開始使用</button>"
    +"<div id=\"micErr\" style=\"display:none;margin-top:12px;background:#3a1a1a;border-radius:8px;padding:10px;font-size:12px;color:#ffaaaa;line-height:1.6\"></div>"
    +"</div>";
  document.body.appendChild(ov);
}
function startApp(){
  unlockAudio();
  if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){
    navigator.mediaDevices.getUserMedia({audio:true})
    .then(function(stream){stream.getTracks().forEach(function(t){t.stop();});})
    .catch(function(){});
  }
}

render();
setTimeout(function(){
  if(navigator.permissions){
    navigator.permissions.query({name:"microphone"}).then(function(r){
      if(r.state!=="granted") showMicOverlay();
    }).catch(function(){ showMicOverlay(); });
  } else { showMicOverlay(); }
},400);
</script>
